name: Test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Node Setup
        uses: actions/setup-node@v6
        with:
          node-version: '22.17.1'
          cache: 'npm'

      - name: Dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
