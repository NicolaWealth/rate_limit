name: Publish to NPM
on:
  release:
    types: [published]

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing (OIDC) requires npm CLI v11.5.1+.
      - name: Ensure npm supports OIDC trusted publishing
        run: |
          echo "Node: $(node --version)"
          echo "npm (before): $(npm --version)"
          npm install -g npm@11.5.1
          echo "npm (after): $(npm --version)"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish package on NPM (OIDC)
        run: npm publish
