name: Publish to NPM
on:
  release:
    types: [published]

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Node Setup
        uses: actions/setup-node@v6
        with:
          node-version: '22.17.1'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing (OIDC) requires npm CLI v11.5.1+.
      - name: Ensure npm supports OIDC trusted publishing
        run: |
          echo "Node: $(node --version)"
          echo "npm (before): $(npm --version)"
          npm install -g npm@11.5.1
          echo "npm (after): $(npm --version)"
          token="$(npm config get //registry.npmjs.org/:_authToken || true)"
          
          if [ -n "${NPM_TOKEN:-}" ] || \
          [ -n "${NODE_AUTH_TOKEN:-}" ] || \
           { [ -n "$token" ] && [ "$token" != "null" ] && [ "$token" != "undefined" ]; }; then
            echo "::error::NPM token detected — OIDC trusted publishing will not be used"
            exit 1
          fi


      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish package on NPM (OIDC)
        run: npm publish
